---
name: SCI for idle
author: Arne Tarara <arne@green-coding.berlin>
description: Idle the container for 60 seconds and outputting SCI

custom_metrics:
  minute_idling:
    unit: minute of idling
    sci: True

services:
  gcb-idle:
    image: alpine
    command: sh
    setup-commands:
      - command: apk add coreutils

flow:
  - name: Idle
    container: gcb-idle
    commands:
      - type: console
        command: sleep 60
        note: Starting Sleep
      - type: console
        note: Writing SCI to stdout
        command: echo $(date +%s%N) minute_idling=1
        shell: sh
